<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andoriña Monitor</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --text-main: #00ffcc;
            --text-muted: #888;
            --text-error: #ff5555;
            --text-warn: #ffaa00;
            --border: #333;
            --radius: 8px;
        html, body {
            height: 100vh;
            min-height: 100vh;
            background-color: var(--bg-dark);
            margin: 0;
            padding: 0;
        }
        body {
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow: hidden;
            border-left: 1px solid var(--border);
        }
        .header {
            background-color: var(--bg-panel);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
            flex-shrink: 0;
        }
        .header h3 { margin: 0; font-size: 0.9rem; font-weight: 600; display:flex; align-items:center; gap:5px; }
        .pulse { width: 8px; height: 8px; background-color: #00ffcc; border-radius: 50%; box-shadow: 0 0 5px #00ffcc; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        
        .tabs {
            display: flex;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .tab {
            flex: 1;
            padding: 5px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.2s;
        }
        .tab:hover { color: white; }
        .tab.active { color: var(--text-main); border-bottom: 2px solid var(--text-main); }
        
        .log-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 0.8rem;
            line-height: 1.4;
            scrollbar-width: thin;
            scrollbar-color: #555 #222;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        
        .line { margin-bottom: 3px; }
        .line.error { color: var(--text-error); }
        .line.warn { color: var(--text-warn); }
        .line.info { color: #88ccff; }
        
        .footer {
            padding: 8px;
            background-color: var(--bg-panel);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .btn {
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        .btn:hover { background: #3a3a3a; border-color: #555; }
        .btn-primary { background: #005f5f; border-color: #008f8f; color: #00ffcc; }
        .btn-primary:hover { background: #007f7f; border-color: #00ffcc; }
    </style>
</head>
<body>
    <div class="header">
        <h3><div class="pulse"></div> <span id="monitor-title">Live Monitor</span></h3>
        <button onclick="parent.App.toggleMonitor()" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer; padding:0 5px;">✖</button>
    </div>
    <div class="tabs">
        <button class="tab active" id="tab-gateway" onclick="switchTab('gateway')">Bridge</button>
        <button class="tab" id="tab-agent" onclick="switchTab('agent')">Agent</button>
        <button class="tab" id="tab-server" onclick="switchTab('server')">Server</button>
    </div>
    <div class="log-container" id="log-view">
        <div style="color:var(--text-muted);text-align:center;margin-top:20px;">Cargando logs...</div>
    </div>
    <div class="footer">
        <button class="btn" onclick="toggleAutoScroll()" id="btn-scroll">Autoscroll: ON</button>
        <button class="btn btn-primary" id="btn-copy" onclick="copyLogs()">Copiar Visibles</button>
    </div>

    <script>
        // Traducir interfaz al cargar
        document.addEventListener('DOMContentLoaded', () => {
            try {
                if (window.parent && window.parent.App) {
                    const t = window.parent.App.t.bind(window.parent.App);
                    document.getElementById('monitor-title').textContent = t('monitor_title', 'Live Monitor');
                    document.getElementById('tab-gateway').textContent = t('monitor_tab_gateway', 'Bridge');
                    document.getElementById('tab-agent').textContent = t('monitor_tab_agent', 'Agent');
                    document.getElementById('tab-server').textContent = t('monitor_tab_server', 'Server');
                    document.getElementById('btn-scroll').textContent = 'Autoscroll: ' + (autoScroll ? 'ON' : 'OFF');
                    document.getElementById('btn-copy').textContent = t('monitor_btn_copy', 'Copiar Visibles');
                    document.querySelector('#log-view div').textContent = t('monitor_loading', 'Cargando logs...');
                }
            } catch(e){}
        });

        let currentTab = 'gateway';
        let autoScroll = true;
        let lastData = {};

        // i18n
        const translations = {
            en: {
                title: 'Live Monitor',
                tab_gateway: 'Bridge',
                tab_agent: 'Agent',
                tab_server: 'Server',
                btn_autoscroll_on: 'Autoscroll: ON',
                btn_autoscroll_off: 'Autoscroll: OFF',
                btn_copy: 'Copy Visible',
                btn_copied: 'Copied!',
                err_empty: '[Empty file or not found]',
                loading: 'Loading logs...',
                err_copy: 'No logs to copy.',
                err_copy_fail: 'Copy failed: '
            },
            es: {
                title: 'Monitor Global',
                tab_gateway: 'Bridge',
                tab_agent: 'Agente',
                tab_server: 'Servidor',
                btn_autoscroll_on: 'Autoscroll: ON',
                btn_autoscroll_off: 'Autoscroll: OFF',
                btn_copy: 'Copiar Visibles',
                btn_copied: '¡Copiado!',
                err_empty: '[Archivo vacío o no encontrado]',
                loading: 'Cargando logs...',
                err_copy: 'No hay logs para copiar.',
                err_copy_fail: 'Error al copiar: '
            }
        };
        const lang = localStorage.getItem('andorina-lang') || 'es';
        const t = translations[lang] || translations['es'];

        document.getElementById('monitor-title').innerText = t.title;
        document.getElementById('tab-gateway').innerText = t.tab_gateway;
        document.getElementById('tab-agent').innerText = t.tab_agent;
        document.getElementById('tab-server').innerText = t.tab_server;
        document.getElementById('btn-scroll').innerText = autoScroll ? t.btn_autoscroll_on : t.btn_autoscroll_off;
        document.getElementById('btn-copy').innerText = t.btn_copy;
        document.getElementById('log-view').innerHTML = `<div style="color:var(--text-muted);text-align:center;margin-top:20px;">${t.loading}</div>`;

        function formatLine(text) {
            let cls = 'line';
            const lower = text.toLowerCase();
            if (lower.includes('error') || lower.includes('failed') || lower.includes('exception')) cls += ' error';
            else if (lower.includes('warn') || lower.includes('timeout')) cls += ' warn';
            else if (lower.includes('info') || lower.includes('success') || lower.includes('ready')) cls += ' info';
            
            // Clean up ANSI color codes
            let clean = text.replace(/\x1B\[\d+m/g, '');
            return `<div class="${cls}">${clean}</div>`;
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                if (!res.ok) throw new Error('Network error');
                const data = await res.json();
                if (data.ok && data.files) {
                    lastData = data.files;
                    renderLogs();
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderLogs() {
            // Prevent rewriting DOM if user is selecting text
            if (window.getSelection().toString().length > 0) return;

            const container = document.getElementById('log-view');
            const lines = lastData[currentTab] || [];
            
            if (lines.length === 0) {
                container.innerHTML = `<div style="color:var(--text-muted);text-align:center;margin-top:20px;">${t.err_empty}</div>`;
                return;
            }

            const newHTML = lines.map(formatLine).join('');
            if (container.innerHTML !== newHTML) {
                container.innerHTML = newHTML;
                if (autoScroll) {
                    container.scrollTop = container.scrollHeight;
                }
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderLogs();
        }

        function toggleAutoScroll() {
            autoScroll = !autoScroll;
            document.getElementById('btn-scroll').innerText = autoScroll ? t.btn_autoscroll_on : t.btn_autoscroll_off;
            if (autoScroll) {
                const container = document.getElementById('log-view');
                container.scrollTop = container.scrollHeight;
            }
        }

        function copyLogs() {
            const lines = lastData[currentTab] || [];
            if (lines.length === 0) return alert(t.err_copy);
            
            // Limit to last 100 lines for clipboard safety if it was larger, though backend returns 30
            const text = lines.join('\n');
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('btn-copy');
                const old = btn.innerText;
                btn.innerText = t.btn_copied;
                setTimeout(() => btn.innerText = old, 2000);
            }).catch(err => alert(t.err_copy_fail + err));
        }

        // Poll every 3 seconds
        setInterval(fetchLogs, 3000);
        fetchLogs();
    </script>
</body>
</html>
